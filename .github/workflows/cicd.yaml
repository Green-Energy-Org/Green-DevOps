name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-clean-example

jobs:

# -----------------------
# SETUP
# -----------------------
  setup:
    name: Setup
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --group dev

# -----------------------
# INSTALL
# -----------------------
  install:
    name: Install
    needs: setup
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --group dev

# -----------------------
# LINT
# -----------------------
  lint:
    name: Lint
    needs: install
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v6
      - run: uv run make code.check

# -----------------------
# BUILD ARTIFACT
# -----------------------
  build-artifact:
    name: Build artifact
    needs: install
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v6
      - run: uv build --out-dir dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

# -----------------------
# TEST
# -----------------------
  test:
    name: Test
    needs: install
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v6
      - run: uv add --dev pytest-cov        # ← ici
      - run: uv run pytest --tb=short --cov=src --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          retention-days: 7

# -----------------------
# DOCKER BUILD
# -----------------------
  docker-build:
    name: Docker build
    needs: [lint, test, build-artifact]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-clean-example:latest .
      - run: docker save ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-clean-example:latest | gzip > /tmp/app-image.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/app-image.tar.gz
          retention-days: 1

# -----------------------
# DOCKER PUSH
# -----------------------
  docker-push:
    name: Docker push
    needs: docker-build
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - run: docker load < /tmp/app-image.tar.gz
      - run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-clean-example:latest

# -----------------------
# DOCKER TEST
# -----------------------
  docker-test:
    name: Docker test
    needs: docker-build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v6
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - run: docker load < /tmp/app-image.tar.gz
      - name: Generate .env
        env:
          APP_ENV: local
        run: uv run config/toml_config_manager.py
      - name: Start stack
        run: |
          cd config/local
          docker compose --env-file .env.local up -d
      - name: Wait for health
        run: |
          timeout 60s bash -s <<'BASH'
          until curl -sf http://127.0.0.1:9999/api/v1/health; do sleep 2; done
          BASH
      - name: Smoke test — signup
        run: |
          curl -f -X POST -H "Content-Type: application/json" \
            -d '{"username": "ci_user", "password": "ci_password1!"}' \
            http://127.0.0.1:9999/api/v1/account/signup
      - name: Smoke test — duplicate returns 409
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"username": "ci_user", "password": "ci_password1!"}' \
            http://127.0.0.1:9999/api/v1/account/signup)
          [[ "$STATUS" == "409" ]] || { echo "Expected 409, got $STATUS"; exit 1; }
      - name: Dump logs on failure
        if: failure()
        run: cd config/local && docker compose --env-file .env.local logs --no-color
      - name: Tear down
        if: always()
        run: cd config/local && docker compose --env-file .env.local down -v

  # -----------------------
# DEPLOY (PRODUCTION)
# -----------------------
  deploy:
    name: Deploy to Production
    needs: [docker-push, docker-test] # On ne déploie que si les tests Docker et le push réussissent
    runs-on: ubuntu-latest # Peut être ubuntu-latest même si le reste est self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://votre-ip-ou-domaine.com
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Aller dans le dossier du projet
            cd /home/${{ secrets.PROD_USERNAME }}/app
            
            # Pull de la dernière image
            docker pull ${{ env.IMAGE_NAME }}:latest
            
            # Mise à jour sans interruption (Zero Downtime-ish)
            # On utilise --remove-orphans pour nettoyer les vieux containers
            docker compose up -d --remove-orphans
            
            # Vérification de santé post-déploiement
            echo "Checking service health..."
            sleep 10
            if [ $(docker inspect -f '{{.State.Running}}' fastapi-app) != "true" ]; then
              echo "Deployment failed! Rolling back..."
              # Ici on pourrait spécifier une version précise pour le rollback
              exit 1
            fi
            echo "Deployment successful!"

# -----------------------
# NOTIFICATIONS (OPTIONNEL)
# -----------------------
  notify:
    name: Notifications
    needs: deploy
    runs-on: self-hosted
    if: always()
    steps:
      - name: Check Status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "🚀 Deployment Succeeded!"
          else
            echo "❌ Deployment Failed!"
          fi
